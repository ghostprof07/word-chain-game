<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lexicoil — Word Chain Game</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
       min-height:100vh;display:flex;align-items:center;justify-content:center;
       text-align:center;padding:32px;color:#fff;
       background:linear-gradient(135deg,#7c3aed 0%,#ff4b96 52%,#ff963c 100%)}
  .wrap{max-width:560px}
  .coil{width:120px;height:120px;margin:0 auto 18px;border-radius:50%;
        border:14px solid #fff;border-right-color:transparent;transform:rotate(-45deg)}
  h1{font-size:3rem;margin:0;letter-spacing:3px}
  .tag{font-size:1.15rem;opacity:.95;margin:6px 0 22px}
  p{line-height:1.6;opacity:.95}
  a{color:#fff;font-weight:600}
</style>
</head>
<body>
  <div class="wrap">
    <div class="coil"></div>
    <h1>LEXICOIL</h1>
    <div class="tag">Word chain — online &amp; solo</div>
    <p>A fast word-chain game: each word starts with the last letter of the
       previous one. Play online against a friend, offline against a bot, or
       solo in Training mode. 6 languages, in-game chat, no ads.</p>
    <p><a href="privacy.html">Privacy Policy</a></p>
  </div>
</body>
</html>
