name: Keystore olustur (bir kerelik)

# JDK'siz kullanicilar icin: imzalama keystore'unu CI'da uretir. Rastgele guvenli
# parolalar olusturur, keystore'u + tum secret degerlerini TEK bir indirilebilir
# artifact'a koyar (parolalar log'a yazilmaz, maskelenir).
#
# KULLANIM:
#   1) Actions -> "Keystore olustur" -> Run workflow
#   2) Biten calismadan "lexicoil-keystore" artifact'ini indir (zip)
#   3) Icindeki lexicoil.keystore'u GUVENLI bir yerde sakla (sonsuza dek!)
#   4) SECRETS.txt'teki degerleri ve lexicoil.keystore.b64 icerigini
#      Settings > Secrets and variables > Actions altinda secret olarak ekle
#   5) Guvenlik icin bu calismayi/artifact'i sonra sil (anahtar GitHub'da kalmasin)
on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-22.04
    steps:
      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Keystore + secret degerleri uret
        run: |
          set -e
          ALIAS=lexicoil
          STOREPASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 28)
          KEYPASS=$STOREPASS
          echo "::add-mask::$STOREPASS"
          keytool -genkeypair -v \
            -keystore lexicoil.keystore -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STOREPASS" -keypass "$KEYPASS" \
            -dname "CN=Lexicoil, O=Lexicoil, C=TR"
          base64 -w0 lexicoil.keystore > lexicoil.keystore.b64
          {
            echo "Asagidaki degerleri GitHub repo Secrets'a ekle:"
            echo "  (Settings > Secrets and variables > Actions > New repository secret)"
            echo ""
            echo "KEY_ALIAS = $ALIAS"
            echo "KEYSTORE_PASSWORD = $STOREPASS"
            echo "KEY_PASSWORD = $KEYPASS"
            echo "KEYSTORE_BASE64 = (lexicoil.keystore.b64 dosyasinin TUM icerigi)"
            echo ""
            echo "lexicoil.keystore dosyasini GUVENLI sakla — uygulama guncellemeleri icin ZORUNLU."
          } > SECRETS.txt
          mkdir out
          mv lexicoil.keystore lexicoil.keystore.b64 SECRETS.txt out/

      - name: Artifact olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: lexicoil-keystore
          path: out/
