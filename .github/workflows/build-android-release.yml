name: Android Release AAB (Google Play)

# Sadece ELLE tetiklenir (Actions sekmesi -> Run workflow). Google Play'e
# yüklenecek İMZALI .aab üretir. İmzalama bilgileri GitHub Secrets'tan gelir:
#   KEYSTORE_BASE64    -> keystore dosyasinin base64 hali
#   KEYSTORE_PASSWORD  -> keystore (store) parolasi
#   KEY_ALIAS          -> anahtar alias adi
#   KEY_PASSWORD       -> anahtar (alias) parolasi
on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-22.04
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Sistem bağımlılıkları
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache wget

      - name: Android SDK + build-tools kur
        run: |
          set -e
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $SDK/cmdline-tools
          mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest
          SDKMGR=$SDK/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMGR --sdk_root=$SDK --licenses >/dev/null 2>&1 || true
          $SDKMGR --sdk_root=$SDK "platform-tools" "build-tools;35.0.0" "platforms;android-35" "cmdline-tools;latest"
          yes | $SDKMGR --sdk_root=$SDK --licenses >/dev/null 2>&1 || true
          mkdir -p $SDK/tools/bin
          ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager
          ln -sf $SDK/cmdline-tools/latest/bin/avdmanager $SDK/tools/bin/avdmanager

      - name: Buildozer kur
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer cython==0.29.36

      - name: Keystore'u hazırla (secret'tan)
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$HOME/release.keystore"
          test -s "$HOME/release.keystore" || (echo "KEYSTORE_BASE64 secret bos!"; exit 1)

      - name: İmzalı AAB derle
        working-directory: client
        env:
          P4A_RELEASE_KEYSTORE: /home/runner/release.keystore
          P4A_RELEASE_KEYSTORE_PASSWD: ${{ secrets.KEYSTORE_PASSWORD }}
          P4A_RELEASE_KEYALIAS: ${{ secrets.KEY_ALIAS }}
          P4A_RELEASE_KEYALIAS_PASSWD: ${{ secrets.KEY_PASSWORD }}
        run: buildozer -v android release

      - name: AAB'yi yükle (indirilebilir çıktı)
        uses: actions/upload-artifact@v4
        with:
          name: lexicoil-aab
          path: client/bin/*.aab
