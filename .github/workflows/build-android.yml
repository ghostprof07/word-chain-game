name: Android APK Derle

# Ne zaman çalışsın: istemci (APK'yı etkileyen) dosyalar değişince ya da elle.
# paths sayesinde sadece sunucu/workflow değişikliklerinde gereksiz APK
# derlemesi yapılmaz. Workflow'un kendisini değiştirince elle (workflow_dispatch)
# ya da Actions sekmesinden "Run workflow" ile test edilebilir.
on:
  push:
    branches: [ main, master ]
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Java 17 — yeni cmdline-tools (sdkmanager) Java 17 ZORUNLU kılıyor.
      # setup-java JAVA_HOME'u 17'ye ayarlar, hem sdkmanager hem buildozer kullanır.
      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Sistem bağımlılıkları
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache wget

      # ── B PLANI: Android SDK'yi buildozer'in TAM beklediği yere elle kur ──
      # build-tools + platform + lisanslar önceden hazır olunca
      # "Aidl not found / build-tools folder not found" hatası oluşmaz.
      - name: Android SDK + build-tools kur
        run: |
          set -e
          SDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK/cmdline-tools
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdtools.zip
          unzip -q cmdtools.zip -d $SDK/cmdline-tools
          mv $SDK/cmdline-tools/cmdline-tools $SDK/cmdline-tools/latest
          SDKMGR=$SDK/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMGR --sdk_root=$SDK --licenses >/dev/null 2>&1 || true
          $SDKMGR --sdk_root=$SDK "platform-tools" "build-tools;34.0.0" "platforms;android-34" "cmdline-tools;latest"
          yes | $SDKMGR --sdk_root=$SDK --licenses >/dev/null 2>&1 || true
          # Buildozer sdkmanager'i ESKI konumda (tools/bin) ariyor — symlink ile karsila
          mkdir -p $SDK/tools/bin
          ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager $SDK/tools/bin/sdkmanager
          ln -sf $SDK/cmdline-tools/latest/bin/avdmanager $SDK/tools/bin/avdmanager
          echo "--- Kurulan build-tools ---"
          ls $SDK/build-tools
          echo "--- aidl var mi? ---"
          ls $SDK/build-tools/34.0.0/aidl
          echo "--- tools/bin/sdkmanager symlink ---"
          ls -l $SDK/tools/bin/sdkmanager

      - name: Buildozer kur
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade buildozer cython==0.29.36

      - name: APK derle
        working-directory: client
        run: buildozer -v android debug

      - name: APK'yı yükle (indirilebilir çıktı)
        uses: actions/upload-artifact@v4
        with:
          name: wordchain-apk
          path: client/bin/*.apk
