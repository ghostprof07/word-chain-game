name: Android APK Derle

# Ne zaman çalışsın: main'e push'ta veya elle tetikleyince
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      # Resmi Buildozer action — tüm Android SDK/NDK + bağımlılıkları
      # doğru sürümlerle hazır Docker konteynerinde kurar (apt derdi yok).
      - name: APK derle (Buildozer)
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer android debug
          workdir: client
          buildozer_version: stable

      - name: APK'yı yükle (indirilebilir çıktı)
        uses: actions/upload-artifact@v4
        with:
          name: wordchain-apk
          path: client/bin/*.apk
