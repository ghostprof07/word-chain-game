name: Android APK Derle

# Ne zaman çalışsın: main'e push'ta veya elle tetikleyince
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sistem bağımlılıkları
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential

      - name: Buildozer kur
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: APK derle
        working-directory: client
        run: buildozer -v android debug

      - name: APK'yı yükle (indirilebilir çıktı)
        uses: actions/upload-artifact@v4
        with:
          name: wordchain-apk
          path: client/bin/*.apk
